default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("POSTGRES_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("POSTGRES_PORT", "5432") %>
  username: <%= ENV.fetch("POSTGRES_USER", "robotman") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "robotmannext") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "robotman_db") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_TEST_DB", "robotman_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "robotman_db") %>
